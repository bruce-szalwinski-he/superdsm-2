name: Validate pull request

on:
  pull_request:

jobs:

  validate_branches:
    name: Validate branches
    runs-on: ubuntu-latest

    steps:

      - name: Validate branches
        if: github.base_ref == 'master' && github.head_ref != 'develop'
        run: |
          echo "Contributions should be made against the develop branch, see README.rst."
          exit 1

  validate_conditional_checks:
    name: Validate conditional checks
    timeout-minutes: 1440
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04

    steps:

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y ca-certificates
    
      - name: Wait for test suite
        uses: blend/require-conditional-status-checks@2022.02.09
        with:
          interval: 20s
          timeout: 1440m
          checks-yaml: |
            - job: 'Test suite'
              paths:
                - .github/workflows/testsuite.yml
                - superdsm/**
                - examples/**
                - superdsm.yml
                - tests/**
