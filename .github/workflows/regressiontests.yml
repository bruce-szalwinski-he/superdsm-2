name: Regression tests

on:
  workflow_dispatch:
  pull_request:
    branches: ['main']
    paths:
      - .github/workflows/regressiontests.yml
      - superdsm/**
      - examples/**
      - superdsm.yml
      - tests/regression
      - requirements.txt

jobs:

  regression_tests:
    name: "Test: ${{ matrix.taskdir }}"
    timeout-minutes: 1440
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        taskdir:
          - U2OS
          - NIH3T3
          - GOWT1-1
          - GOWT1-2

    steps:

      - name: Checkout
        uses: actions/checkout@v2
